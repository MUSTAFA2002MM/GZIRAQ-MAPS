version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gziraq_maps
      POSTGRES_USER: gziraq
      POSTGRES_PASSWORD: gziraq_password
    volumes:
      - gziraq_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gziraq -d gziraq_maps"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: run app in Docker too (or use PM2 on host instead)
  # app:
  #   build: .
  #   restart: unless-stopped
  #   env_file:
  #     - ./backend/.env
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     db:
  #       condition: service_healthy

volumes:
  gziraq_pgdata:
